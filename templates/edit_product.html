{% extends 'base.html' %}
{% set page_title = 'Редактирование товара' %}
{% block content %}<section class="panel page-panel"><h2>Изменить товар</h2><form class="form-grid product-form" method="post"><input name="name" value="{{ product.name }}" required><input name="category" value="{{ product.category }}" required><input name="unit" value="{{ product.unit }}" required><input name="purchase_price" type="number" step="0.01" value="{{ product.purchase_price }}" required><input name="sale_price" type="number" step="0.01" value="{{ product.sale_price }}" required><input name="quantity" type="number" step="0.01" value="{{ product.quantity }}" required><input name="min_quantity" type="number" step="0.01" value="{{ product.min_quantity }}" required><button class="btn-primary">Сохранить изменения</button></form></section>{% endblock %}
